stages:
  - check
  - build
  - publish

default:
  tags:
    - Ark-Stage

# -------------------------------------------------------------------
# Shared Templates
# -------------------------------------------------------------------

.node-setup: &node-setup
  image: node:22-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - corepack enable && corepack prepare --activate
    - pnpm install --frozen-lockfile --ignore-scripts

# -------------------------------------------------------------------
# CI: runs on every push and merge request
# -------------------------------------------------------------------

lint:
  stage: check
  <<: *node-setup
  script:
    - pnpm run lint
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success

typecheck:
  stage: check
  <<: *node-setup
  script:
    - pnpm run typecheck
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success

test:
  stage: check
  <<: *node-setup
  script:
    - pnpm run test
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success

size:
  stage: check
  <<: *node-setup
  script:
    - pnpm run build
    - pnpm run size
  dependencies: []
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success

changeset:check:
  stage: check
  <<: *node-setup
  script:
    - pnpm changeset status
  rules:
    - if: $CI_MERGE_REQUEST_IID
  allow_failure: true

build:
  stage: build
  <<: *node-setup
  script:
    - pnpm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

chromatic:
  stage: check
  <<: *node-setup
  before_script:
    - apk add --no-cache git
    - corepack enable && corepack prepare --activate
    - pnpm install --frozen-lockfile --ignore-scripts
  script:
    - pnpm run chromatic
  rules:
    - if: $CI_MERGE_REQUEST_IID && $CHROMATIC_PROJECT_TOKEN
    - if: $CI_COMMIT_BRANCH == "main" && $CHROMATIC_PROJECT_TOKEN
  allow_failure: true

# -------------------------------------------------------------------
# Publish: only on tags on main branch
# (Storybook is deployed to GitHub Pages via .github/workflows/deploy-storybook.yml)
# -------------------------------------------------------------------

publish:gitlab:
  stage: publish
  image: node:22-alpine
  dependencies:
    - build
  variables:
    HUSKY: "0"
  before_script:
    - corepack enable && corepack prepare --activate
  script:
    - |
      echo "@arkite-ui:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
      echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${PUBLISH_TOKEN}" >> .npmrc
    - pnpm publish --no-git-checks
  rules:
    - if: $CI_COMMIT_TAG

publish:npm:
  stage: publish
  image: node:22-alpine
  dependencies:
    - build
  variables:
    HUSKY: "0"
  before_script:
    - corepack enable && corepack prepare --activate
  script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - pnpm publish --no-git-checks --access public
  rules:
    - if: $CI_COMMIT_TAG && $NPM_TOKEN
