stages:
  - check
  - build
  - deploy
  - publish

# -------------------------------------------------------------------
# CI: runs on every push and merge request
# -------------------------------------------------------------------

lint:
  stage: check
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci --ignore-scripts
    - npm run lint

typecheck:
  stage: check
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci --ignore-scripts
    - npm run typecheck

test:
  stage: check
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci --ignore-scripts
    - npm run test
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

build:
  stage: build
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci --ignore-scripts
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

# -------------------------------------------------------------------
# Deploy & Publish: only on tags on main branch
# -------------------------------------------------------------------

build-storybook:
  stage: build
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci --ignore-scripts
    - npm run build-storybook
  artifacts:
    paths:
      - storybook-static/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG

pages:
  stage: deploy
  dependencies:
    - build-storybook
  script:
    - mv storybook-static public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_TAG

publish:
  stage: publish
  image: node:20-alpine
  dependencies:
    - build
  script:
    - |
      echo "@arkite:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
      echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm publish
  rules:
    - if: $CI_COMMIT_TAG
